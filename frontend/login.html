<!DOCTYPE html>
<html>
<head>
<title>Project Shield Login</title>
<style>
body{
margin:0;
background:linear-gradient(135deg,#0f0f0f,#1e1e1e);
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}
.box{
background:#222;
padding:35px;
border-radius:15px;
width:320px;
box-shadow:0 0 20px rgba(0,255,255,.2);
}
h2{
text-align:center;
margin-bottom:20px;
}
input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
outline:none;
}
button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#00c3ff;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}
button:hover{
background:#0099cc;
}
#msg{
text-align:center;
margin-top:15px;
color:#ff5555;
}
</style>
</head>

<body>

<div class="box">
<h2>🛡 Project Shield</h2>

<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Secure Login</button>

<p id="msg"></p>
</div>

<script>
async function login(){

const username = document.getElementById("user").value;
const password = document.getElementById("pass").value;

document.getElementById("msg").innerText="Checking...";
const res = await fetch("https://project-shield-1-tmre.onrender.com/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({username,password})
});

const data = await res.json();

if(data.status==="success"){

localStorage.setItem("token",data.token);
localStorage.setItem("username",data.username);

document.getElementById("msg").style.color="lightgreen";
document.getElementById("msg").innerText="Login Success";

setTimeout(()=>{
window.location.href="index.html";
},1000);

}else{
document.getElementById("msg").style.color="red";
document.getElementById("msg").innerText=data.message;
}
}
</script>

</body>
</html>
